<a [routerLink]="['/providers', provider.slug]" class="provider-card-link text-decoration-none">
  <div class="provider-card glassmorphism glow-on-hover">
    <div class="provider-logo-container">
      @if (provider.logo && (provider.logo.startsWith('http') || provider.logo.startsWith('/') || provider.logo.includes('.'))) {
        <img [src]="provider.logo" [alt]="provider.name" class="provider-logo-img" />
      } @else {
        <i [class]="provider.logo || 'fas fa-gamepad text-secondary'"></i>
      }
    </div>
    <h4 class="provider-name text-white m-0 text-truncate">{{ provider.name }}</h4>
    <span class="provider-game-count text-secondary">{{ provider.gameCount || 0 }} Games</span>
  </div>
</a>
